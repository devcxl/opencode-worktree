name: Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 要创建 Draft Release 的 tag (如 v1.0.0)
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  draft-release:
    name: 根据 tag 创建发布草稿
    runs-on: ubuntu-latest

    steps:
      - name: Determine tag to use
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read package version
        id: package
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          EXPECTED_TAG="v${{ steps.package.outputs.version }}"
          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag ($TAG) 与 package.json 版本不一致，期望为 $EXPECTED_TAG"
            exit 1
          fi

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Release ${{ steps.tag.outputs.value }}
          draft: true
          generate_release_notes: true